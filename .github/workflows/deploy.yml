name: Deploy Vote App

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build SSR + Vite
        run: npm run build

      - name: Clean before upload
        run: |
          rm -rf node_modules
          rm -rf .git

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/var/www/vote"

      - name: Run deploy commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd /var/www/vote

            # ── Sanity check ──────────────────────────────────────────────────
            if [ ! -f .env ]; then
              echo "ERROR: .env is missing on the server. Aborting." >&2
              exit 1
            fi

            # ── Fix ownership so www-data can read/write everything ───────────
            # (root can chown freely; www-data cannot)
            chown -R www-data:www-data /var/www/vote
            chmod -R 755 /var/www/vote
            chmod -R 775 /var/www/vote/storage /var/www/vote/bootstrap/cache

            # ── Install PHP dependencies as www-data ──────────────────────────
            # Composer writes vendor/ → must be owned by www-data
            sudo -u www-data composer install \
              --no-dev \
              --no-interaction \
              --prefer-dist \
              --optimize-autoloader

            # ── Clear stale caches (run as www-data so cache files are owned correctly) ──
            sudo -u www-data php artisan config:clear
            sudo -u www-data php artisan route:clear
            sudo -u www-data php artisan view:clear
            sudo -u www-data php artisan cache:clear

            # ── Run migrations ────────────────────────────────────────────────
            sudo -u www-data php artisan migrate --force --no-interaction

            # ── Create storage symlink (idempotent) ───────────────────────────
            sudo -u www-data php artisan storage:link --force

            # ── Rebuild caches for production ─────────────────────────────────
            sudo -u www-data php artisan config:cache
            sudo -u www-data php artisan route:cache
            sudo -u www-data php artisan view:cache
            sudo -u www-data php artisan optimize

            # ── Restart SSR process (supervisor runs as root) ─────────────────
            supervisorctl restart vote-ssr
            supervisorctl status vote-ssr